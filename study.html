<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7POS1 - studijní přehled (všechny otázky a odpovědi)</title>
  <meta name="description" content="Statický přehled všech zkouškových otázek z Počítačových sítí 1 (7POS1) s vyznačenými správnými odpověďmi." />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="top-row">
      <div class="top-bar">
        <button class="nav-toggle" type="button" aria-label="Otevrit menu" aria-expanded="false" aria-controls="topNav">
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
          <span class="nav-toggle-bar"></span>
        </button>
        <nav id="topNav" class="top-links" aria-label="Navigace">
          <a class="top-link" href="index.html">Cvičný test</a>
          <a class="top-link is-active" href="study.html">Studijní přehled</a>
        </nav>
        <div class="theme-float" aria-label="Přepínání motivu">
          <div class="theme-dropdown">
            <button id="themeToggle" class="theme-trigger" type="button" aria-label="Přepnout motiv" aria-haspopup="listbox" aria-expanded="false">
              <i class="bi bi-brightness-high-fill theme-icon" aria-hidden="true"></i>
              <span class="theme-label">Světlý</span>
              <i class="bi bi-chevron-down" aria-hidden="true"></i>
            </button>
            <div class="theme-menu" role="listbox" aria-label="Volba motivu">
              <button class="theme-item" type="button" role="option" data-theme="light">
                <i class="bi bi-brightness-high-fill" aria-hidden="true"></i>
                <span>Světlý</span>
              </button>
              <button class="theme-item" type="button" role="option" data-theme="auto">
                <i class="bi bi-circle-half" aria-hidden="true"></i>
                <span>Auto</span>
              </button>
              <button class="theme-item" type="button" role="option" data-theme="dark">
                <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
                <span>Tmavý</span>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="hero card-surface">
        <div>
          <p class="eyebrow">Počítačové sítě 1</p>
          <h1>Všechny otázky &amp; odpovědi</h1>
        </div>
      </div>
    </section>

    <section id="messageBar" class="message-bar card-surface hidden"></section>

    <section id="toolbar" class="study-toolbar card-surface hidden">
      <div class="toolbar-row">
        <label class="toolbar-field">
          <span>Hledat</span>
          <input id="searchInput" type="search" placeholder="Hledej v otázce nebo v odpovědích…" autocomplete="off">
        </label>
        <label class="toolbar-field">
          <span>Přednáška</span>
          <select id="lectureFilter"></select>
        </label>
        <label class="toolbar-field">
          <span>Typ</span>
          <select id="typeFilter">
            <option value="">Všechny typy</option>
            <option value="multichoice">Výběr (multichoice)</option>
            <option value="truefalse">Pravda / Nepravda</option>
            <option value="shortanswer">Krátká odpověď</option>
            <option value="matching">Přiřazování</option>
            <option value="cloze">Doplňování</option>
            <option value="essay">Esej</option>
          </select>
        </label>
      </div>
      <p id="counterLine" class="help-text"></p>
    </section>

    <section id="content" class="study-content"></section>
  </main>

  <script src="study.js"></script>
  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const topNav = document.getElementById('topNav');
    if (navToggle && topNav) {
      navToggle.addEventListener('click', () => {
        const isOpen = topNav.classList.toggle('is-open');
        navToggle.setAttribute('aria-expanded', String(isOpen));
      });
    }
  </script>
</body>
</html>
